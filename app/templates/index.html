<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StrangerSync</title>
    <!-- Favicon handling -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>
<body>

    <!-- 1. HEADER -->
    <header class="top-bar">
        <div class="brand">
            <span class="material-symbols-rounded" style="color:#3b82f6;"><img src="/static/favicon.svg" alt="Logo"></span>
            <span>StrangerSync</span>
        </div>
        
        <button class="chat-toggle-btn" onclick="toggleChatLayout()">
            <span class="material-symbols-rounded" style="font-size:18px;">chat_bubble</span>
            <span>Chat</span>
        </button>

        <div class="status-pill">
            <div id="status-dot"></div>
            <span id="status">Ready</span>
        </div>
    </header>

    <!-- 2. MAIN LAYOUT -->
    <main class="app-container">
        
        <!-- LEFT: VIDEO AREA -->
        <section class="video-pane">
            <div class="video-wrapper">
                <!-- Remote Video (The Stranger) -->
                <video id="remoteVideo" autoplay playsinline></video>
                
                <!-- Local Video (You) - Floating PIP -->
                <div class="local-video-container">
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>

                <!-- Overlay Controls -->
                <div class="video-controls">
                    <!-- Swap Camera (Hidden by default, shown by JS if 2+ cameras) -->
                    <button id="swapBtn" class="btn-icon" onclick="switchCamera()" style="display:none;" title="Switch Camera">
                        <span class="material-symbols-rounded">flip_camera_ios</span>
                    </button>

                    <!-- Mute Button -->
                    <button id="micBtn" class="btn-icon" onclick="toggleMic()" title="Toggle Microphone">
                        <span id="icon-unmuted" class="material-symbols-rounded">mic</span>
                        <span id="icon-muted" class="material-symbols-rounded" style="display:none;">mic_off</span>
                    </button>

                    <!-- Main Action Button -->
                    <button id="actionBtn" class="btn btn-primary" onclick="handleAction()">
                        Find Match
                    </button>
                </div>
            </div>
        </section>

        <!-- RIGHT: CHAT AREA -->
        <section class="chat-pane">
            <div class="chat-header">Live Chat</div>
            
            <div id="chatBox" class="chat-messages">
                <div class="system-msg">Matches are random. Say Hi! 👋</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendBtn" onclick="sendChat()">
                    <span class="material-symbols-rounded">send</span>
                </button>
            </div>
        </section>

    </main>
    <div id="toast-container"></div>
    <script src="/static/client.js"></script>
    <script>
        document.getElementById("msgInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendChat();
        });
    </script>
</body>
</html>
