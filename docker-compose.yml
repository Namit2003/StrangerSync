version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: strangersync-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strangersync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - strangersync-network

  # Redis (Message Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: strangersync-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - strangersync-network

  # Admin Service
  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    container_name: strangersync-admin
    ports:
      - "8003:8003"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strangersync
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - strangersync-network
    volumes:
      - ./services/shared:/app/shared
      - ./services/admin-service/app:/app/app

  # Matching Service
  matching-service:
    build:
      context: ./services/matching-service
      dockerfile: Dockerfile
    container_name: strangersync-matching
    ports:
      - "8002:8002"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strangersync
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - strangersync-network
    volumes:
      - ./services/shared:/app/shared
      - ./services/matching-service/app:/app/app

  # Signaling Service
  signaling-service:
    build:
      context: ./services/signaling-service
      dockerfile: Dockerfile
    container_name: strangersync-signaling
    ports:
      - "8001:8001"
    environment:
      USER_SERVICE_URL: http://user-service:8004
      MATCHING_SERVICE_URL: http://matching-service:8002
    depends_on:
      - matching-service
      - user-service
    networks:
      - strangersync-network
    volumes:
      - ./services/shared:/app/shared
      - ./services/signaling-service/app:/app/app

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: strangersync-user
    ports:
      - "8004:8004"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strangersync
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - strangersync-network
    volumes:
      - ./services/shared:/app/shared
      - ./services/user-service/app:/app/app

  # StrangerSync Application (Monolith - will gradually migrate)
  app:
    build: .
    container_name: strangersync-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strangersync
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./static:/app/static
    networks:
      - strangersync-network

networks:
  strangersync-network:
    driver: bridge

volumes:
  postgres_data:
